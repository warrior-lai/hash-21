<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash21 Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg:#0a0a0a; --bg2:#141414; --bg3:#1e1e1e; --text:#f0f0f0; --dim:#888; --gold:#b08d57; --green:#2dd4a8; --red:#e74c3c; --border:#2a2a2a; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
.app { display:flex; min-height:100vh; }
.sidebar { width:220px; background:var(--bg2); border-right:1px solid var(--border); padding:20px 0; position:fixed; height:100vh; }
.sidebar h1 { font-size:16px; padding:0 20px 20px; color:var(--gold); font-weight:600; letter-spacing:1px; }
.sidebar a { display:block; padding:10px 20px; color:var(--dim); text-decoration:none; font-size:13px; transition:all 0.2s; cursor:pointer; }
.sidebar a:hover, .sidebar a.active { color:var(--text); background:var(--bg3); border-left:2px solid var(--gold); }
.main { margin-left:220px; flex:1; padding:30px; }
h2 { font-size:18px; font-weight:500; margin-bottom:20px; color:var(--gold); }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:15px; }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.card-header h3 { font-size:15px; font-weight:500; }
.badge { font-size:11px; padding:3px 10px; border-radius:10px; font-weight:500; }
.badge-active { background:rgba(45,212,168,0.15); color:var(--green); }
.badge-pending { background:rgba(176,141,87,0.15); color:var(--gold); }
.badge-consult { background:rgba(176,141,87,0.15); color:var(--gold); }
.badge-available { background:rgba(45,212,168,0.15); color:var(--green); }
.badge-hidden { background:rgba(136,136,136,0.15); color:var(--dim); }
.meta { color:var(--dim); font-size:12px; margin-top:5px; }
.actions { display:flex; gap:8px; margin-top:12px; }
.btn { padding:6px 16px; border:none; border-radius:4px; font-family:'Inter',sans-serif; font-size:12px; cursor:pointer; transition:all 0.2s; }
.btn-gold { background:var(--gold); color:var(--bg); }
.btn-gold:hover { opacity:0.85; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--dim); }
.btn-outline:hover { border-color:var(--gold); color:var(--gold); }
.btn-danger { background:transparent; border:1px solid var(--red); color:var(--red); }
.btn-danger:hover { background:var(--red); color:white; }
.btn-add { background:var(--gold); color:var(--bg); padding:8px 20px; font-size:13px; border:none; border-radius:4px; cursor:pointer; font-family:'Inter',sans-serif; }

/* Modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:100; justify-content:center; align-items:center; }
.modal-overlay.active { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:30px; width:90%; max-width:500px; max-height:90vh; overflow-y:auto; }
.modal h3 { font-size:16px; margin-bottom:20px; color:var(--gold); }
.form-group { margin-bottom:15px; }
.form-group label { display:block; font-size:12px; color:var(--dim); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
.form-group input, .form-group textarea, .form-group select { width:100%; padding:10px; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:'Inter',sans-serif; font-size:13px; border-radius:4px; }
.form-group textarea { height:80px; resize:vertical; }
.form-group input:focus, .form-group textarea:focus { border-color:var(--gold); outline:none; }
.form-actions { display:flex; gap:10px; margin-top:20px; }
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; margin-bottom:30px; }
.stat { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:20px; text-align:center; }
.stat-number { font-size:28px; font-weight:600; color:var(--gold); }
.stat-label { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; margin-top:5px; }
.card-img { width:60px; height:60px; border-radius:4px; object-fit:cover; margin-right:12px; }
.card-row { display:flex; align-items:center; }
.empty { text-align:center; color:var(--dim); padding:40px; }

/* Login */
.login-screen { display:flex; justify-content:center; align-items:center; min-height:100vh; background:var(--bg); }
.login-box { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:40px; width:90%; max-width:360px; text-align:center; }
.login-box h1 { color:var(--gold); font-size:18px; letter-spacing:2px; margin-bottom:8px; }
.login-box p { color:var(--dim); font-size:12px; margin-bottom:25px; }
.login-box input { width:100%; padding:12px; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:'Inter',sans-serif; font-size:13px; border-radius:4px; margin-bottom:12px; }
.login-box input:focus { border-color:var(--gold); outline:none; }
.login-box button { width:100%; padding:12px; background:var(--gold); color:var(--bg); border:none; font-family:'Inter',sans-serif; font-size:13px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; border-radius:4px; }
.login-box button:hover { opacity:0.85; }
.login-error { color:var(--red); font-size:12px; margin-top:10px; display:none; }
.logout-btn { color:var(--dim); font-size:12px; cursor:pointer; padding:10px 20px; margin-top:auto; display:block; text-decoration:none; border-top:1px solid var(--border); }
.logout-btn:hover { color:var(--red); }

@media (max-width:768px) {
  .sidebar { width:100%; height:auto; position:relative; display:flex; flex-wrap:wrap; padding:10px; }
  .sidebar h1 { width:100%; padding:5px 10px 10px; }
  .sidebar a { padding:8px 12px; }
  .main { margin-left:0; padding:15px; }
  .stats { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<!-- Login Screen -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h1>HASH21</h1>
    <p>Admin Panel</p>
    <form onsubmit="handleLogin(event)">
      <input type="email" id="login-email" placeholder="Email" required>
      <input type="password" id="login-password" placeholder="Password" required>
      <button type="submit" id="login-btn">Iniciar sesión</button>
    </form>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- App (hidden until logged in) -->
<div class="app" id="admin-app" style="display:none">
  <nav class="sidebar" style="display:flex;flex-direction:column;">
    <h1>HASH21 ADMIN</h1>
    <a class="active" onclick="showSection('dashboard')">📊 Dashboard</a>
    <a onclick="showSection('artists')">👥 Artistas</a>
    <a onclick="showSection('works')">🎨 Obras</a>
    <a onclick="showSection('products')">🛒 Productos</a>
    <a onclick="showSection('users')">👤 Usuarios</a>
    <a onclick="showSection('certs')">📜 Certificados</a>
    <a class="logout-btn" onclick="handleLogout()">🚪 Cerrar sesión</a>
  </nav>

  <div class="main">
    <!-- Dashboard -->
    <div id="sec-dashboard">
      <h2>Dashboard</h2>
      <div class="stats">
        <div class="stat"><div class="stat-number" id="stat-artists">-</div><div class="stat-label">Artistas</div></div>
        <div class="stat"><div class="stat-number" id="stat-works">-</div><div class="stat-label">Obras</div></div>
        <div class="stat"><div class="stat-number" id="stat-products">-</div><div class="stat-label">Productos</div></div>
        <div class="stat"><div class="stat-number" id="stat-certs">-</div><div class="stat-label">Certificados</div></div>
        <div class="stat"><div class="stat-number" id="stat-zaps">-</div><div class="stat-label">Zaps</div></div>
        <div class="stat"><div class="stat-number" id="stat-sats">-</div><div class="stat-label">Sats ⚡</div></div>
      </div>
      <div id="dashboard-recent"></div>
    </div>

    <!-- Artists -->
    <div id="sec-artists" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="margin:0">Artistas</h2>
        <button class="btn-add" onclick="openModal('artist')">+ Nuevo Artista</button>
      </div>
      <div id="artists-list"></div>
    </div>

    <!-- Works -->
    <div id="sec-works" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="margin:0">Obras</h2>
        <button class="btn-add" onclick="openModal('work')">+ Nueva Obra</button>
      </div>
      <div id="works-list"></div>
    </div>

    <!-- Products -->
    <div id="sec-products" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="margin:0">Productos</h2>
        <button class="btn-add" onclick="openModal('product')">+ Nuevo Producto</button>
      </div>
      <div id="products-list"></div>
    </div>

    <!-- Users -->
    <div id="sec-users" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="margin:0">Usuarios</h2>
        <button class="btn-add" onclick="openModal('user')">+ Nuevo Usuario</button>
      </div>
      <div id="users-list"></div>
    </div>

    <!-- Certificates -->
    <div id="sec-certs" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="margin:0">Certificados</h2>
      </div>
      <div id="certs-list"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title">Nuevo</h3>
    <form id="modal-form" onsubmit="handleSubmit(event)">
      <div id="modal-fields"></div>
      <div class="form-actions">
        <button type="submit" class="btn btn-gold">Guardar</button>
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<script>
const API = 'https://hash21-backend.vercel.app/api';

// XSS sanitization
function esc(str) { 
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
const SUPABASE_URL = 'https://gxrstqszfzvwvoktsuqg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4cnN0cXN6Znp2d3Zva3RzdXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTcyMDEsImV4cCI6MjA4OTc3MzIwMX0.vZv-Z1rRrWErjKnsWGzkrrfTaveZHlccXnw7u4iP_cc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentSection = 'dashboard';
let currentModal = null;
let editingId = null;
let artistsCache = [];
let currentUser = null; // { id, email, role, artist_id }

// Auth
async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    showApp();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-app').style.display = 'none';
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  
  btn.textContent = '...';
  btn.disabled = true;
  err.style.display = 'none';
  
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  
  if (error) {
    err.textContent = 'Email o contraseña incorrectos';
    err.style.display = 'block';
    btn.textContent = 'Iniciar sesión';
    btn.disabled = false;
    return;
  }
  
  showApp();
}

async function handleLogout() {
  await sb.auth.signOut();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-app').style.display = 'none';
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-app').style.display = 'flex';
  
  // Get current user role
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const users = await api('/users');
    currentUser = users.find(u => u.email === session.user.email) || { role: 'artist' };
    
    // Hide sections based on role
    if (currentUser.role !== 'admin') {
      document.querySelector('a[onclick*="users"]').style.display = 'none';
      document.querySelector('a[onclick*="artists"]').style.display = 'none';
    }
  }
  
  loadDashboard();
}

checkAuth();

// Navigation
function showSection(name) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  event.target.classList.add('active');
  ['dashboard','artists','works','products','users','certs'].forEach(s => {
    document.getElementById('sec-' + s).style.display = s === name ? 'block' : 'none';
  });
  currentSection = name;
  loadSection(name);
}

// Load data
async function loadSection(name) {
  if (name === 'dashboard') await loadDashboard();
  if (name === 'artists') await loadArtists();
  if (name === 'works') await loadWorks();
  if (name === 'products') await loadProducts();
  if (name === 'users') await loadUsers();
  if (name === 'certs') await loadCerts();
}

async function api(endpoint, method, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + endpoint, opts);
  return await res.json();
}

async function loadDashboard() {
  const [artists, works, products] = await Promise.all([
    api('/artists'), api('/works'), api('/products')
  ]);
  artistsCache = artists;
  document.getElementById('stat-artists').textContent = artists.length;
  document.getElementById('stat-works').textContent = works.length;
  document.getElementById('stat-products').textContent = products.length;
  
  // Certificates count
  const certs = works.filter(w => w.certificate_hash).length;
  document.getElementById('stat-certs').textContent = certs;
  
  // Zap stats
  try {
    const zapRes = await fetch(API + '/log-zap');
    const zapData = await zapRes.json();
    document.getElementById('stat-zaps').textContent = zapData.total_zaps || 0;
    document.getElementById('stat-sats').textContent = (zapData.total_sats || 0).toLocaleString();
  } catch(e) {
    document.getElementById('stat-zaps').textContent = '—';
    document.getElementById('stat-sats').textContent = '—';
  }
}

async function loadArtists() {
  const artists = await api('/artists');
  artistsCache = artists;
  if (!artists.length) { document.getElementById('artists-list').innerHTML = '<div class="empty">No hay artistas. Creá el primero.</div>'; return; }
  document.getElementById('artists-list').innerHTML = artists.map(a => `
    <div class="card">
      <div class="card-header">
        <div class="card-row">
          ${a.photo_url ? `<img src="${a.photo_url}" class="card-img">` : ''}
          <div>
            <h3>${esc(a.name)}</h3>
            <div class="meta">${esc(a.lightning_address)} · ${a.slug}</div>
          </div>
        </div>
        <span class="badge badge-${a.status}">${a.status}</span>
      </div>
      <div class="meta">${esc(a.bio_es)}</div>
      <div class="actions">
        <button class="btn btn-outline" onclick='editArtist(${JSON.stringify(a)})'>Editar</button>
        <button class="btn btn-danger" onclick="deleteItem('artists','${a.id}','${esc(a.name)}')">Eliminar</button>
      </div>
    </div>
  `).join('');
}

async function loadWorks() {
  let works = await api('/works');
  // Filter by artist if not admin
  if (currentUser && currentUser.role !== 'admin' && currentUser.artist_id) {
    works = works.filter(w => w.artist_id === currentUser.artist_id);
  }
  if (!works.length) { document.getElementById('works-list').innerHTML = '<div class="empty">No hay obras. Creá la primera.</div>'; return; }
  document.getElementById('works-list').innerHTML = works.map(w => `
    <div class="card">
      <div class="card-header">
        <div class="card-row">
          ${w.image_url ? `<img src="${w.image_url}" class="card-img">` : ''}
          <div>
            <h3>${esc(w.title_es)}</h3>
            <div class="meta">${esc(w.technique)} ${w.artists ? '· ' + w.artists.name : ''}</div>
          </div>
        </div>
        <span class="badge badge-${w.status}">${w.status}</span>
      </div>
      ${w.certificate_status && w.certificate_status !== 'none' 
        ? `<div class="meta" style="margin-top:8px;color:var(--green);">📜 ${w.certificate_status === 'certified' ? 'Certificada · Bloque #' + w.certificate_block : w.certificate_status === 'pending' ? 'Pendiente de confirmación en blockchain' : 'Hash: ' + (w.certificate_hash || '').substring(0,16) + '...'} 
        <a href="${API}/certificate-pdf?work_id=${w.id}" target="_blank" style="margin-left:8px;color:var(--gold);font-size:11px;">📄 Ver certificado</a></div>` 
        : ''}
      <div class="actions">
        <button class="btn btn-outline" onclick='editWork(${JSON.stringify(w)})'>Editar</button>
        <button class="btn btn-outline" onclick="changeStatus('works','${w.id}','${w.status === 'available' ? 'consult' : 'available'}')">${w.status === 'available' ? 'Poner en Consultar' : 'Poner Disponible'}</button>
        ${!w.certificate_status || w.certificate_status === 'none' 
          ? `<button class="btn btn-gold" onclick="certifyWork('${w.id}')">📜 Certificar</button>` 
          : w.certificate_status === 'pending' 
            ? `<button class="btn btn-outline" onclick="certifyWork('${w.id}', true)">🔄 Re-enviar</button>`
            : ''}
        <button class="btn btn-danger" onclick="deleteItem('works','${w.id}','${esc(w.title_es)}')">Eliminar</button>
      </div>
    </div>
  `).join('');
}

async function loadProducts() {
  let products = await api('/products');
  // Filter by artist if not admin (assuming products have artist_id)
  if (currentUser && currentUser.role !== 'admin' && currentUser.artist_id) {
    products = products.filter(p => p.artist_id === currentUser.artist_id);
  }
  if (!products.length) { document.getElementById('products-list').innerHTML = '<div class="empty">No hay productos. Creá el primero.</div>'; return; }
  document.getElementById('products-list').innerHTML = products.map(p => `
    <div class="card">
      <div class="card-header">
        <div class="card-row">
          ${p.image_url ? `<img src="${p.image_url}" class="card-img">` : ''}
          <div>
            <h3>${esc(p.name_es)}</h3>
            <div class="meta">${p.price_sats ? p.price_sats.toLocaleString() + ' sats' : 'Precio a consultar'}</div>
          </div>
        </div>
        <span class="badge badge-${p.status}">${p.status}</span>
      </div>
      <div class="meta">${esc(p.desc_es)}</div>
      <div class="actions">
        <button class="btn btn-outline" onclick='editProduct(${JSON.stringify(p)})'>Editar</button>
        <button class="btn btn-danger" onclick="deleteItem('products','${p.id}','${esc(p.name_es)}')">Eliminar</button>
      </div>
    </div>
  `).join('');
}

// Load Users
async function loadUsers() {
  const users = await api('/users');
  if (!users || !users.length) { document.getElementById('users-list').innerHTML = '<div class="empty">No hay usuarios registrados.</div>'; return; }
  document.getElementById('users-list').innerHTML = users.map(u => `
    <div class="card">
      <div class="card-header">
        <div>
          <h3>${esc(u.email)}</h3>
          <div class="meta">Rol: ${u.role} ${u.artists ? '· Artista: ' + esc(u.artists.name) : ''}</div>
        </div>
        <span class="badge badge-${u.status}">${u.status}</span>
      </div>
      <div class="meta">Creado: ${new Date(u.created_at).toLocaleDateString()}</div>
      <div class="actions">
        ${u.status === 'pending' ? `<button class="btn btn-gold" onclick="updateUserStatus('${u.id}','active')">✓ Aprobar</button>` : ''}
        ${u.status === 'active' ? `<button class="btn btn-outline" onclick="updateUserStatus('${u.id}','suspended')">Suspender</button>` : ''}
        ${u.status === 'suspended' ? `<button class="btn btn-outline" onclick="updateUserStatus('${u.id}','active')">Reactivar</button>` : ''}
        <button class="btn btn-outline" onclick='editUser(${JSON.stringify(u)})'>Editar</button>
        <button class="btn btn-danger" onclick="deleteItem('users','${u.id}','${esc(u.email)}')">Eliminar</button>
      </div>
    </div>
  `).join('');
}

async function updateUserStatus(id, status) {
  await api('/users', 'PUT', { id, status });
  loadUsers();
}

function editUser(u) { openModal('user', u); }

// Load Certificates
async function loadCerts() {
  let works = await api('/works');
  // Filter by artist if not admin
  if (currentUser && currentUser.role !== 'admin' && currentUser.artist_id) {
    works = works.filter(w => w.artist_id === currentUser.artist_id);
  }
  const certified = works.filter(w => w.certificate_hash);
  if (!certified.length) { document.getElementById('certs-list').innerHTML = '<div class="empty">No hay certificados emitidos.</div>'; return; }
  document.getElementById('certs-list').innerHTML = certified.map(w => `
    <div class="card" style="border-left:3px solid ${w.certificate_status === 'certified' ? 'var(--green)' : 'var(--gold)'};">
      <div class="card-header">
        <div class="card-row">
          ${w.image_url ? `<img src="${w.image_url}" class="card-img" style="width:80px;height:80px;object-fit:cover;border-radius:4px;">` : ''}
          <div>
            <h3 style="display:flex;align-items:center;gap:10px;">
              ${esc(w.title_es)}
              ${w.certificate_block ? `<a href="https://mempool.space/block/${w.certificate_block}" target="_blank" style="color:var(--gold);font-size:12px;text-decoration:none;">⛓ #${w.certificate_block}</a>` : ''}
            </h3>
            <div class="meta">${w.artists ? esc(w.artists.name) : '—'}</div>
          </div>
        </div>
        <span class="badge badge-${w.certificate_status}" style="font-size:12px;padding:5px 12px;">${w.certificate_status === 'certified' ? '✓ Bloque Confirmado' : '⏳ Pendiente'}</span>
      </div>
      <div class="meta" style="margin-top:12px;padding:12px;background:var(--bg3);border-radius:4px;">
        <strong>Hash:</strong> <code style="font-size:10px;">${w.certificate_hash}</code><br>
        <strong>Fecha:</strong> ${w.certificate_date ? new Date(w.certificate_date).toLocaleString() : '—'}<br>
        ${w.certificate_block ? `<strong>Bloque:</strong> #${w.certificate_block}` : ''}
      </div>
      <div class="actions">
        <a href="${API}/certificate-pdf?work_id=${w.id}" target="_blank" class="btn btn-outline">📄 Ver Certificado</a>
        ${w.certificate_status === 'pending' ? `<button class="btn btn-outline" onclick="certifyWork('${w.id}', true)">🔄 Re-enviar</button>` : ''}
      </div>
    </div>
  `).join('');
}

// Modal
function openModal(type, data) {
  currentModal = type;
  editingId = data ? data.id : null;
  document.getElementById('modal-title').textContent = (editingId ? 'Editar ' : 'Nuevo ') + 
    (type === 'artist' ? 'Artista' : type === 'work' ? 'Obra' : type === 'user' ? 'Usuario' : 'Producto');
  
  const fields = getFields(type, data);
  document.getElementById('modal-fields').innerHTML = fields;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  editingId = null;
}

function getFields(type, d) {
  d = d || {};
  if (type === 'artist') return `
    <div class="form-group"><label>Nombre</label><input name="name" value="${d.name||''}" required></div>
    <div class="form-group"><label>Slug (URL)</label><input name="slug" value="${d.slug||''}" required></div>
    <div class="form-group"><label>Bio (ES)</label><textarea name="bio_es">${d.bio_es||''}</textarea></div>
    <div class="form-group"><label>Bio (EN)</label><textarea name="bio_en">${d.bio_en||''}</textarea></div>
    <div class="form-group"><label>Motto</label><input name="motto" value="${d.motto||''}"></div>
    <div class="form-group"><label>Lightning Address</label><input name="lightning_address" value="${d.lightning_address||''}"></div>
    <div class="form-group"><label>Instagram</label><input name="instagram" value="${d.links?.instagram||''}"></div>
    <div class="form-group"><label>Twitter/X</label><input name="twitter" value="${d.links?.twitter||''}"></div>
    <div class="form-group"><label>Estado</label><select name="status">
      <option value="active" ${d.status==='active'?'selected':''}>Activo</option>
      <option value="pending" ${d.status==='pending'?'selected':''}>Pendiente</option>
      <option value="inactive" ${d.status==='inactive'?'selected':''}>Inactivo</option>
    </select></div>`;
  
  if (type === 'work') {
    const artistOpts = artistsCache.map(a => `<option value="${a.id}" ${d.artist_id===a.id?'selected':''}>${esc(a.name)}</option>`).join('');
    return `
    <div class="form-group"><label>Artista</label><select name="artist_id" required>${artistOpts}</select></div>
    <div class="form-group"><label>Título (ES)</label><input name="title_es" value="${d.title_es||''}" required></div>
    <div class="form-group"><label>Título (EN)</label><input name="title_en" value="${d.title_en||''}"></div>
    <div class="form-group"><label>Técnica</label><input name="technique" value="${d.technique||''}"></div>
    <div class="form-group"><label>Dimensiones</label><input name="dimensions" value="${d.dimensions||''}"></div>
    <div class="form-group"><label>URL Imagen</label><input name="image_url" value="${d.image_url||''}"></div>
    <div class="form-group"><label>Tipo</label><select name="type">
      <option value="physical" ${d.type==='physical'?'selected':''}>Física</option>
      <option value="digital" ${d.type==='digital'?'selected':''}>Digital</option>
    </select></div>
    <div class="form-group"><label>Estado</label><select name="status">
      <option value="available" ${d.status==='available'?'selected':''}>Disponible</option>
      <option value="consult" ${d.status==='consult'?'selected':''}>Consultar</option>
      <option value="hidden" ${d.status==='hidden'?'selected':''}>Oculta</option>
    </select></div>`;
  }
  
  if (type === 'product') return `
    <div class="form-group"><label>Nombre (ES)</label><input name="name_es" value="${d.name_es||''}" required></div>
    <div class="form-group"><label>Nombre (EN)</label><input name="name_en" value="${d.name_en||''}"></div>
    <div class="form-group"><label>Etiqueta (ES)</label><input name="label_es" value="${d.label_es||''}"></div>
    <div class="form-group"><label>Etiqueta (EN)</label><input name="label_en" value="${d.label_en||''}"></div>
    <div class="form-group"><label>Descripción (ES)</label><textarea name="desc_es">${d.desc_es||''}</textarea></div>
    <div class="form-group"><label>Descripción (EN)</label><textarea name="desc_en">${d.desc_en||''}</textarea></div>
    <div class="form-group"><label>Precio (sats) — dejar vacío para "consultar"</label><input name="price_sats" type="number" value="${d.price_sats||''}"></div>
    <div class="form-group"><label>URL Imagen</label><input name="image_url" value="${d.image_url||''}"></div>
    <div class="form-group"><label>Estado</label><select name="status">
      <option value="available" ${d.status==='available'?'selected':''}>Disponible</option>
      <option value="consult" ${d.status==='consult'?'selected':''}>Consultar</option>
      <option value="hidden" ${d.status==='hidden'?'selected':''}>Oculto</option>
    </select></div>`;

  if (type === 'user') {
    const artistOpts = '<option value="">— Sin vincular —</option>' + artistsCache.map(a => `<option value="${a.id}" ${d.artist_id===a.id?'selected':''}>${esc(a.name)}</option>`).join('');
    const isNew = !d.id;
    return `
    <div class="form-group"><label>Email</label><input name="email" type="email" value="${d.email||''}" ${isNew ? 'required' : 'readonly style="opacity:0.6"'}></div>
    <div class="form-group"><label>${isNew ? 'Contraseña' : 'Nueva Contraseña (dejar vacío para no cambiar)'}</label><input name="password" type="password" ${isNew ? 'required minlength="6"' : ''} placeholder="${isNew ? 'Mínimo 6 caracteres' : 'Dejar vacío para mantener actual'}"></div>
    <div class="form-group"><label>Rol</label><select name="role">
      <option value="artist" ${d.role==='artist'?'selected':''}>Artista</option>
      <option value="collaborator" ${d.role==='collaborator'?'selected':''}>Colaborador</option>
      <option value="admin" ${d.role==='admin'?'selected':''}>Admin</option>
    </select></div>
    <div class="form-group"><label>Vincular a Artista</label><select name="artist_id">${artistOpts}</select></div>
    <div class="form-group"><label>Estado</label><select name="status">
      <option value="pending" ${d.status==='pending'?'selected':''}>Pendiente</option>
      <option value="active" ${d.status==='active'?'selected':''}>Activo</option>
      <option value="suspended" ${d.status==='suspended'?'selected':''}>Suspendido</option>
    </select></div>`;
  }
}

// Edit helpers
function editArtist(a) { openModal('artist', a); }
function editWork(w) { openModal('work', w); }
function editProduct(p) { openModal('product', p); }

// Submit
async function handleSubmit(e) {
  e.preventDefault();
  const form = new FormData(e.target);
  const data = Object.fromEntries(form);
  
  // Clean up
  if (data.price_sats === '') data.price_sats = null;
  else if (data.price_sats) data.price_sats = parseInt(data.price_sats);
  
  // Handle artist links
  if (currentModal === 'artist') {
    data.links = { instagram: data.instagram || '', twitter: data.twitter || '' };
    delete data.instagram;
    delete data.twitter;
  }
  
  const endpoint = currentModal === 'artist' ? '/artists' : currentModal === 'work' ? '/works' : currentModal === 'user' ? '/users' : '/products';
  
  if (editingId) {
    data.id = editingId;
    await api(endpoint, 'PUT', data);
  } else {
    await api(endpoint, 'POST', data);
  }
  
  closeModal();
  loadSection(currentSection);
}

// Delete
async function deleteItem(endpoint, id, name) {
  if (!confirm(`¿Eliminar "${name}"?`)) return;
  await api('/' + endpoint + '?id=' + id, 'DELETE');
  loadSection(currentSection);
}

// Change status
async function changeStatus(endpoint, id, newStatus) {
  await api('/' + endpoint, 'PUT', { id, status: newStatus });
  loadSection(currentSection);
}

// Certify work
async function certifyWork(workId, force = false) {
  const msg = force 
    ? '¿Re-enviar esta obra a OpenTimestamps?' 
    : '¿Certificar esta obra on-chain? Se calculará el SHA-256 y se enviará a OpenTimestamps.';
  if (!confirm(msg)) return;
  
  try {
    const res = await api('/certify', 'POST', { work_id: workId, force: force });
    if (res.error) {
      alert('Error: ' + res.error);
      return;
    }
    const statusMsg = res.status === 'pending' 
      ? 'Enviado a OpenTimestamps. Se anclará en un bloque de Bitcoin en las próximas horas.' 
      : 'Hash calculado. Pendiente de envío.';
    alert('✅ Hash: ' + res.hash + (res.resubmitted ? ' (re-enviado)' : '') + '\n\nEstado: ' + statusMsg);
    loadWorks();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}
