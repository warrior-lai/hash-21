<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Hash21 Subastas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .logo {
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 40px;
    }
    .logo span { color: #9a7b4f; }
    .code {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 120px;
      font-weight: 400;
      color: #e5e0d8;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 12px;
    }
    p {
      color: #8a8580;
      font-size: 14px;
      margin-bottom: 32px;
      max-width: 400px;
    }
    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .primary {
      background: #9a7b4f;
      color: white;
    }
    .primary:hover {
      background: #8a6b3f;
    }
    .secondary {
      background: transparent;
      color: #9a7b4f;
      border: 1px solid #9a7b4f;
    }
    .secondary:hover {
      background: rgba(154, 123, 79, 0.1);
    }
  </style>
</head>
<body>
  <div class="logo">HASH<span>21</span></div>
  <div class="code">404</div>
  <h1>Página no encontrada</h1>
  <p>La subasta que buscás no existe o ya fue eliminada. Explorá las subastas activas o volvé a la galería.</p>
  <div class="buttons">
    <a href="/" class="primary">Ver Subastas</a>
    <a href="https://hash21.studio" class="secondary">Ir a la Galería</a>
  </div>
</body>
</html>
