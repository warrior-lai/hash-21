<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrate — Hash21</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --gold: #c9a227;
      --text: #e8e8e8;
      --text-dim: #888;
      --border: #222;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 420px;
    }
    .logo {
      text-align: center;
      font-size: 28px;
      letter-spacing: 6px;
      margin-bottom: 40px;
    }
    .logo span { color: var(--gold); }
    
    /* Steps */
    .step { display: none; }
    .step.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Progress */
    .progress {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
    }
    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }
    .progress-dot.active { background: var(--gold); }
    .progress-dot.done { background: var(--text-dim); }
    
    /* Form elements */
    h2 {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 30px;
    }
    input, textarea {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      transition: border-color 0.3s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--gold);
    }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }
    textarea { resize: none; min-height: 100px; }
    
    /* Type selector */
    .type-selector {
      display: flex;
      gap: 16px;
      margin-bottom: 30px;
    }
    .type-option {
      flex: 1;
      padding: 30px 20px;
      border: 1px solid var(--border);
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .type-option:hover { border-color: var(--text-dim); }
    .type-option.selected { border-color: var(--gold); background: rgba(201, 162, 39, 0.05); }
    .type-option .icon { font-size: 32px; margin-bottom: 12px; }
    .type-option .label { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
    
    /* Buttons */
    .btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover { background: var(--gold); color: var(--bg); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 12px;
      padding: 12px;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-secondary:hover { color: var(--text); }
    
    /* Error */
    .error {
      color: #ff6b6b;
      font-size: 12px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }
    
    /* Success */
    .success-icon {
      font-size: 64px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    /* Link */
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .login-link {
      text-align: center;
      margin-top: 30px;
      font-size: 13px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">HASH<span>21</span></div>
    
    <div class="progress">
      <div class="progress-dot active" data-step="1"></div>
      <div class="progress-dot" data-step="2"></div>
      <div class="progress-dot" data-step="3"></div>
      <div class="progress-dot" data-step="4"></div>
    </div>
    
    <!-- Step 1: Email + Password -->
    <div class="step active" data-step="1">
      <h2>Creá tu cuenta</h2>
      <p class="subtitle">Unite a la galería de arte Bitcoin</p>
      <div class="error" id="error-1"></div>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required>
      <button class="btn" onclick="step1()">Continuar</button>
      <p class="login-link">¿Ya tenés cuenta? <a href="/admin">Iniciá sesión</a></p>
    </div>
    
    <!-- Step 2: Type -->
    <div class="step" data-step="2">
      <h2>¿Qué creás?</h2>
      <p class="subtitle">Esto nos ayuda a personalizar tu experiencia</p>
      <div class="type-selector">
        <div class="type-option" data-type="artist" onclick="selectType('artist')">
          <div class="icon">🎨</div>
          <div class="label">Arte</div>
        </div>
        <div class="type-option" data-type="designer" onclick="selectType('designer')">
          <div class="icon">🛠️</div>
          <div class="label">Diseño</div>
        </div>
      </div>
      <button class="btn" onclick="step2()" id="btn-step2" disabled>Continuar</button>
      <button class="btn-secondary" onclick="goBack(1)">← Volver</button>
    </div>
    
    <!-- Step 3: Profile -->
    <div class="step" data-step="3">
      <h2>Tu perfil</h2>
      <p class="subtitle">Contanos sobre vos</p>
      <input type="text" id="name" placeholder="Nombre artístico">
      <textarea id="bio" placeholder="Bio breve (opcional)"></textarea>
      <input type="url" id="portfolio" placeholder="Link a portfolio o redes (opcional)">
      <button class="btn" onclick="step3()">Continuar</button>
      <button class="btn-secondary" onclick="goBack(2)">← Volver</button>
    </div>
    
    <!-- Step 4: Success -->
    <div class="step" data-step="4">
      <div class="success-icon">✨</div>
      <h2>¡Bienvenido a Hash21!</h2>
      <p class="subtitle">Tu perfil está siendo revisado.<br>Te notificaremos cuando esté activo.</p>
      <button class="btn" onclick="window.location.href='/admin'">Ir al panel</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://gxrstqszfzvwvoktsuqg.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4cnN0cXN6Znp2d3Zva3RzdXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTcyMDEsImV4cCI6MjA4OTc3MzIwMX0.vZv-Z1rRrWErjKnsWGzkrrfTaveZHlccXnw7u4iP_cc';
    const API = 'https://hash21-backend.vercel.app/api';
    
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
    
    let userData = { email: '', type: '', name: '', bio: '', portfolio: '' };
    let currentStep = 1;
    
    function showStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.querySelector(`.step[data-step="${n}"]`).classList.add('active');
      document.querySelectorAll('.progress-dot').forEach(d => {
        const step = parseInt(d.dataset.step);
        d.classList.remove('active', 'done');
        if (step < n) d.classList.add('done');
        if (step === n) d.classList.add('active');
      });
      currentStep = n;
    }
    
    function showError(step, msg) {
      const err = document.getElementById(`error-${step}`);
      if (err) {
        err.textContent = msg;
        err.style.display = 'block';
      }
    }
    
    function goBack(step) {
      showStep(step);
    }
    
    async function step1() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showError(1, 'Completá todos los campos');
        return;
      }
      if (password.length < 6) {
        showError(1, 'La contraseña debe tener al menos 6 caracteres');
        return;
      }
      
      const btn = document.querySelector('.step[data-step="1"] .btn');
      btn.disabled = true;
      btn.textContent = 'Creando...';
      
      const { data, error } = await sb.auth.signUp({ email, password });
      
      if (error) {
        showError(1, error.message);
        btn.disabled = false;
        btn.textContent = 'Continuar';
        return;
      }
      
      userData.email = email;
      showStep(2);
    }
    
    function selectType(type) {
      document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
      document.querySelector(`.type-option[data-type="${type}"]`).classList.add('selected');
      userData.type = type;
      document.getElementById('btn-step2').disabled = false;
    }
    
    function step2() {
      if (!userData.type) return;
      showStep(3);
    }
    
    async function step3() {
      userData.name = document.getElementById('name').value.trim();
      userData.bio = document.getElementById('bio').value.trim();
      userData.portfolio = document.getElementById('portfolio').value.trim();
      
      const btn = document.querySelector('.step[data-step="3"] .btn');
      btn.disabled = true;
      btn.textContent = 'Guardando...';
      
      // Create user in our DB
      try {
        await fetch(`${API}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: userData.email,
            role: userData.type === 'artist' ? 'artist' : 'designer',
            status: 'pending',
            name: userData.name,
            bio: userData.bio,
            portfolio: userData.portfolio
          })
        });
      } catch (e) {
        console.error('Error creating user:', e);
      }
      
      showStep(4);
    }
  </script>
</body>
</html>
