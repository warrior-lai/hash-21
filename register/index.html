<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrate — Hash21</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --gold: #c9a227;
      --text: #e8e8e8;
      --text-dim: #888;
      --border: #222;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 380px;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .logo {
      text-align: center;
      font-size: 28px;
      letter-spacing: 6px;
      margin-bottom: 12px;
    }
    .logo span { color: var(--gold); }
    .tagline {
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-bottom: 50px;
    }
    
    h2 {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 30px;
      text-align: center;
    }
    
    input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: var(--gold);
    }
    input::placeholder { color: var(--text-dim); }
    
    .btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .btn:hover { background: var(--gold); color: var(--bg); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .error {
      color: #ff6b6b;
      font-size: 12px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }
    
    .login-link {
      text-align: center;
      margin-top: 30px;
      font-size: 13px;
      color: var(--text-dim);
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">HASH<span>21</span></div>
    <div class="tagline">GALERÍA DE ARTE BITCOIN</div>
    
    <h2>Creá tu cuenta</h2>
    
    <div class="error" id="error"></div>
    <form onsubmit="handleRegister(event)">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Contraseña" required minlength="6">
      <button type="submit" class="btn" id="btn">Registrarme</button>
    </form>
    
    <p class="login-link">¿Ya tenés cuenta? <a href="/admin">Iniciá sesión</a></p>
  </div>

  <script>
    const SUPABASE_URL = 'https://gxrstqszfzvwvoktsuqg.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4cnN0cXN6Znp2d3Zva3RzdXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTcyMDEsImV4cCI6MjA4OTc3MzIwMX0.vZv-Z1rRrWErjKnsWGzkrrfTaveZHlccXnw7u4iP_cc';
    const API = 'https://hash21-backend.vercel.app/api';
    
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
    
    async function handleRegister(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn');
      const err = document.getElementById('error');
      
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creando...';
      
      // Create Supabase auth user
      const { data, error } = await sb.auth.signUp({ email, password });
      
      if (error) {
        err.textContent = error.message === 'User already registered' 
          ? 'Este email ya está registrado' 
          : error.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Registrarme';
        return;
      }
      
      // Create user in our DB with pending status
      try {
        await fetch(`${API}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            role: 'pending',
            status: 'pending'
          })
        });
      } catch (e) {
        console.error('Error creating user:', e);
      }
      
      // Redirect to admin (will show onboarding)
      window.location.href = '/admin';
    }
  </script>
</body>
</html>
