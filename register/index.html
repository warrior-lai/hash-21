<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrate — Hash21</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/nostr-login@1.7.12/dist/nostr-login.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --gold: #c9a227;
      --text: #f5f5f5;
      --text-dim: #888;
      --border: #1f1f1f;
      --bg2: #111;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    .logo span { color: var(--gold); }
    .tagline {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 2px;
      margin-bottom: 40px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-color: var(--gold);
    }
    input::placeholder { color: var(--text-dim); }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: #ef4444;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }
    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .footer a { color: var(--gold); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
<link rel="canonical" href="https://hash21.studio/register/">
</head>
<body>
  <div class="box">
    <div class="logo">HASH<span>21</span></div>
    <div class="tagline">GALERÍA DE ARTE BITCOIN</div>
    
    <div class="error" id="error"></div>
    
    <button type="button" style="width:100%;padding:16px;background:var(--gold);color:var(--bg);border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:12px;letter-spacing:1px;" onclick="registerWithNostr()">Crear cuenta con Nostr (NIP-07)</button>
    
    <button type="button" style="width:100%;padding:16px;background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:16px;letter-spacing:1px;" onclick="showBunkerInput()">Crear cuenta con Bunker (NIP-46)</button>
    
    <div id="bunker-input" style="display:none;margin-bottom:16px;">
      <input type="text" id="bunker-uri" placeholder="bunker://... o nostr+bunker://..." style="width:100%;padding:14px 16px;background:#1a1a1a;border:1px solid var(--border);color:var(--text);border-radius:8px;margin-bottom:8px;font-size:13px;">
      <button type="button" onclick="registerWithBunker()" style="width:100%;padding:12px;background:var(--gold);color:var(--bg);border:none;border-radius:8px;font-size:13px;cursor:pointer;">Conectar Bunker</button>
      <p style="font-size:11px;color:#666;margin-top:8px;text-align:center;">Pegá tu URI de nsec.app o Amber</p>
    </div>
    
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;"><div style="flex:1;height:1px;background:var(--border);"></div><span style="color:var(--text-dim);font-size:12px;">o email</span><div style="flex:1;height:1px;background:var(--border);"></div></div>
    
    <form onsubmit="handleRegister(event)">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Contraseña" required minlength="6">
      <button type="submit" class="btn" id="btn">Crear cuenta</button>
    </form>
    
    <p class="footer">¿Ya tenés cuenta? <a href="/admin">Iniciar sesión</a></p>
  </div>

  <script>
    function showBunkerInput() {
      const input = document.getElementById('bunker-input');
      input.style.display = input.style.display === 'none' ? 'block' : 'none';
    }

    async function registerWithBunker() {
      const uri = document.getElementById('bunker-uri').value.trim();
      if (!uri) {
        alert('Ingres\u00e1 tu URI de bunker');
        return;
      }
      
      if (!uri.startsWith('bunker://') && !uri.startsWith('nostr+bunker://')) {
        alert('URI inv\u00e1lida. Debe empezar con bunker:// o nostr+bunker://');
        return;
      }
      
      try {
        const cleanUri = uri.replace('nostr+bunker://', '').replace('bunker://', '');
        const [pubkeyPart] = cleanUri.split('?');
        const pubkey = pubkeyPart;
        
        if (!pubkey || pubkey.length !== 64) {
          alert('Pubkey inv\u00e1lida en la URI');
          return;
        }
        
        localStorage.setItem('nostr-pubkey', pubkey);
        localStorage.setItem('hash21-auth', JSON.stringify({
          method: 'bunker',
          pubkey: pubkey,
          bunkerUri: uri,
          loggedIn: true,
          timestamp: Date.now()
        }));
        
        // Register in backend
        await fetch(`${API}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            nostr_pubkey: pubkey, 
            role: 'artist', 
            status: 'active' 
          })
        }).catch(() => {});
        
        alert('Conectado con Bunker: ' + pubkey.slice(0, 8) + '...');
        window.location.href = '/admin';
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function registerWithNostr() {
      if (typeof window.nostr === 'undefined') {
        alert('Necesit\u00e1s una extensi\u00f3n Nostr (Alby o nos2x).\nInstal\u00e1 desde getalby.com')
        return
      }
      
      try {
        const pubkey = await window.nostr.getPublicKey()
        
        // Save to localStorage
        localStorage.setItem('nostr-pubkey', pubkey)
        localStorage.setItem('hash21-auth', JSON.stringify({
          method: 'nostr',
          pubkey: pubkey,
          loggedIn: true,
          timestamp: Date.now()
        }))
        
        // Register in backend
        await fetch(`${API}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            nostr_pubkey: pubkey, 
            role: 'artist', 
            status: 'active' 
          })
        }).catch(() => {}) // Ignore if fails
        
        // Redirect to admin
        window.location.href = '/admin'
      } catch (e) {
        alert('Error: ' + e.message)
      }
    }

    const SUPABASE_URL = 'https://gxrstqszfzvwvoktsuqg.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4cnN0cXN6Znp2d3Zva3RzdXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTcyMDEsImV4cCI6MjA4OTc3MzIwMX0.vZv-Z1rRrWErjKnsWGzkrrfTaveZHlccXnw7u4iP_cc';
    const API = 'https://hash21-backend.vercel.app/api';
    
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
    
    // Clear any existing session on page load
    sb.auth.signOut();
    
    async function handleRegister(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn');
      const err = document.getElementById('error');
      
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creando...';
      
      // Make sure we're signed out
      await sb.auth.signOut();
      
      const { data, error } = await sb.auth.signUp({ email, password });
      
      // signup completed
      
      if (error) {
        err.textContent = error.message === 'User already registered' 
          ? 'Este email ya está registrado' 
          : error.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
        return;
      }
      
      // Check if email confirmation is required
      if (data.user && !data.session) {
        // Email confirmation required
        document.querySelector('.box').innerHTML = `
          <div class="logo">HASH<span>21</span></div>
          <div style="margin-top:40px;text-align:center;">
            <div style="font-size:48px;margin-bottom:20px;">✉️</div>
            <h2 style="font-size:18px;margin-bottom:12px;">Verificá tu email</h2>
            <p style="color:var(--text-dim);font-size:14px;line-height:1.6;">
              Te enviamos un link de confirmación a<br>
              <strong style="color:var(--gold)">${email}</strong>
            </p>
            <p style="color:var(--text-dim);font-size:13px;margin-top:24px;">
              Después de confirmar, <a href="/admin" style="color:var(--gold)">iniciá sesión</a>
            </p>
          </div>
        `;
        
        // Create user in DB anyway
        await fetch(`${API}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, role: 'artist', status: 'pending' })
        });
        return;
      }
      
      // Create user in DB
      await fetch(`${API}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, role: 'artist', status: 'pending' })
      });
      
      window.location.href = '/admin';
    }
  </script>
</body>
</html>
